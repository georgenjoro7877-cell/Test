<!DOCTYPE html>
<html>
    <body>
        <img src="Css.png" alt="School logo" width="100" style="display: block; margin: auto;">
    </body>
    <head>
        <title>Student Registration form</title>
    </head>

    <body style="background-color:white;font-family: Arial, Helvetica, sans-serif;">
        <h1 style="text-align: center; color: lightskyblue;">Student Registration</h1>

        <form style="width: 50%; margin: auto;background: white; padding: 20px; border-radius: 15%;">

            <label style="border: 2px solid black; padding: 5px;">NAME</label>
            <input type="text"><br><br>

            <label style="border: 2px solid black; padding: 5px;">EMAIL</label>
            <input type="text"><br><br>

            <label style="border: 2px solid black; padding: 5px;">Date Of Birth</label>
            <input type="Date"><br><br>

            <label style="border: 2px solid black; padding: 5px;">Gender</label>
            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select><br><br>

            <label style="border: 2px solid black; padding: 5px;">Select hobbie</label>
            <select>
                <option>Hobbies</option>
                <option>Running</option><br>
                <option>Skating</option><br>
                <option>Singing</option><br>
                <option>Reading</option><br>
            </select><br><br>

            <label style="border: 2px solid black; padding: 5px;">Main Course</label>
            <select>
                <option>Main Cource</option>
                <option>Information Technology</option>
                <option>Computer Science</option>
                <option>Business IT</option>
                <option>Data Science</option>
            </select><br><br>

            <div class="buttons">
                <input type="submit" value="Submitt">
                <input type="Reset" value="Reset">
            </div>
        </form>
    </body>
</html>
